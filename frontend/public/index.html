<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f1117" />
    <meta name="description" content="Dispatch — Productivity Layer for Professionals" />
    <title>Dispatch</title>
    <link rel="icon" type="image/x-icon" href="/dispatch-logo.png" />
    <link rel="apple-touch-icon" href="/dispatch-logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Pre-React loading screen — replaced instantly when JS loads -->
      <div id="app-loading" style="
        min-height:100vh;
        display:flex;
        flex-direction:column;
        align-items:center;
        justify-content:center;
        background:linear-gradient(135deg,#0f1117 0%,#1a1d2e 50%,#0f1117 100%);
        gap:20px;
      ">
        <img src="/dispatch-logo.png" alt="Dispatch" style="width:80px;height:54px;object-fit:contain;animation:pulse 1.5s ease-in-out infinite;" />
        <span style="color:#b0b8cc;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;letter-spacing:0.5px;">Loading Dispatch…</span>
        <style>
          @keyframes pulse { 0%,100%{opacity:0.5;transform:scale(0.97)} 50%{opacity:1;transform:scale(1)} }
        </style>
      </div>
    </div>
  </body>
</html>
